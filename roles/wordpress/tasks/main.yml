- name: Create Wordpress installation directory
  file:
    path: "/var/www/"
    state: directory
    mode: '0755'

- name: Download WordPress
  get_url:
    url: https://wordpress.org/latest.tar.gz
    dest: /tmp/wordpress.tar.gz

- name: Extract WordPress
  unarchive:
    src: /tmp/wordpress.tar.gz
    dest: /var/www/
    remote_src: yes

- name: Set permissions
  file:
    path: "{{ wordpress_root }}"
    owner: www-data
    group: www-data
    recurse: yes